<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Logo-forslag</title>
<style>
  @font-face {
    font-family: 'Cormorant Garamond';
    font-style: normal;
    font-weight: 700;
    src: url('images/fonts/cormorant-garamond-700-latin.woff2') format('woff2');
  }
  body {
    background: #f5f0e6;
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 60px 40px;
    color: #2a2018;
  }
  h2 { font-weight: 500; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: #857766; margin: 40px 0 12px; }
  .row { display: flex; gap: 40px; align-items: center; flex-wrap: wrap; padding: 30px 20px; background: white; border: 1px solid #e6dccd; border-radius: 8px; margin-bottom: 16px; }
  .row.dark { background: #2a2018; }
  .row.dark .label { color: #d4cfc4; }
  .label { font-size: 12px; color: #857766; min-width: 180px; }
  .logo { display: inline-block; vertical-align: middle; }
  .logo svg { display: block; }
  .rr-text {
    font-family: 'Playfair Display', 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 32px;
    color: #2a2018;
    letter-spacing: 0.02em;
  }
  .row.dark .rr-text { color: #f5f0e6; }
  .rr-as { color: #857766; font-weight: 400; font-size: 0.7em; margin-left: 0.3em; }
</style>
</head>
<body>

<h2>Forslag A: Delt rygg med Cormorant Garamond (stor)</h2>
<div class="row">
  <span class="label">Stor, lys bakgrunn</span>
  <div class="logo" style="width: 220px; height: 120px;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 130" style="width:100%;height:100%">
      <text x="120" y="92" text-anchor="end" style="font-family:'Cormorant Garamond','Times New Roman',serif;font-weight:700;font-size:95px;fill:none;stroke:#9A7B2E;stroke-width:1.4;stroke-linejoin:round">R</text>
      <text x="120" y="92" text-anchor="start" style="font-family:'Cormorant Garamond','Times New Roman',serif;font-weight:700;font-size:95px;fill:none;stroke:#9A7B2E;stroke-width:1.4;stroke-linejoin:round">R</text>
      <line x1="120" y1="20" x2="120" y2="110" stroke="#9A7B2E" stroke-width="2.6" stroke-linecap="round"/>
    </svg>
  </div>
  <span class="rr-text">Rent og Ryddig <span class="rr-as">AS</span></span>
</div>

<h2>Forslag B: Samme logo, mindre (som på bilen)</h2>
<div class="row">
  <span class="label">Liten, lys bakgrunn</span>
  <div class="logo" style="width: 110px; height: 60px;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 130" style="width:100%;height:100%">
      <text x="120" y="92" text-anchor="end" style="font-family:'Cormorant Garamond','Times New Roman',serif;font-weight:700;font-size:95px;fill:none;stroke:#9A7B2E;stroke-width:1.4;stroke-linejoin:round">R</text>
      <text x="120" y="92" text-anchor="start" style="font-family:'Cormorant Garamond','Times New Roman',serif;font-weight:700;font-size:95px;fill:none;stroke:#9A7B2E;stroke-width:1.4;stroke-linejoin:round">R</text>
      <line x1="120" y1="20" x2="120" y2="110" stroke="#9A7B2E" stroke-width="2.6" stroke-linecap="round"/>
    </svg>
  </div>
  <span class="rr-text">Rent og Ryddig <span class="rr-as">AS</span></span>
</div>

<h2>Forslag C: På mørk bakgrunn (som bilen)</h2>
<div class="row dark">
  <span class="label">Stor, mørk bakgrunn</span>
  <div class="logo" style="width: 220px; height: 120px;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 130" style="width:100%;height:100%">
      <text x="120" y="92" text-anchor="end" style="font-family:'Cormorant Garamond','Times New Roman',serif;font-weight:700;font-size:95px;fill:none;stroke:#D4A82A;stroke-width:1.4;stroke-linejoin:round">R</text>
      <text x="120" y="92" text-anchor="start" style="font-family:'Cormorant Garamond','Times New Roman',serif;font-weight:700;font-size:95px;fill:none;stroke:#D4A82A;stroke-width:1.4;stroke-linejoin:round">R</text>
      <line x1="120" y1="20" x2="120" y2="110" stroke="#D4A82A" stroke-width="2.6" stroke-linecap="round"/>
    </svg>
  </div>
  <span class="rr-text">Rent og Ryddig <span class="rr-as">AS</span></span>
</div>

</body>
</html>
